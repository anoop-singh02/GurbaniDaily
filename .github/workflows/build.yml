name: Build APK

on:
  push:
    branches: [ main, master, 'claude/**' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync CHANGELOG.md into APK assets before building
        run: |
          mkdir -p app/src/main/assets
          cp CHANGELOG.md app/src/main/assets/CHANGELOG.md

      - name: Extract version + latest changelog entry
        id: notes
        run: |
          VERSION_CODE="${GITHUB_RUN_NUMBER}"
          VERSION_NAME="4.${GITHUB_RUN_NUMBER}"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          awk '/^## /{if(count++){exit}} count' CHANGELOG.md > .latest_notes.md
          echo "" >> .latest_notes.md
          echo "---" >> .latest_notes.md
          echo "Debug APK from commit ${{ github.sha }} on branch \`${{ github.ref_name }}\`." >> .latest_notes.md

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk GurbaniDaily.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GurbaniDaily-apk
          path: GurbaniDaily.apk
          if-no-files-found: error

      - name: Publish release with APK + changelog
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.version_name }}
          name: v${{ steps.notes.outputs.version_name }} · build-${{ steps.notes.outputs.version_code }}
          body_path: .latest_notes.md
          files: GurbaniDaily.apk
          make_latest: "true"
