name: Build APK

on:
  push:
    branches: [ main, master, 'claude/**' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk GurbaniDaily.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GurbaniDaily-apk
          path: GurbaniDaily.apk
          if-no-files-found: error

      - name: Publish release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: GurbaniDaily build ${{ github.run_number }}
          body: |
            Debug APK from commit ${{ github.sha }} on branch `${{ github.ref_name }}`.

            Download **GurbaniDaily.apk** below, open it on your Pixel, and tap Install.
          files: GurbaniDaily.apk
          make_latest: "true"
